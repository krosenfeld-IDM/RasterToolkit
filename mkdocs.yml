site_name: RasterToolkit
site_url: https://institutefordiseasemodeling.github.io/RasterToolkit/
repo_name: InstituteforDiseaseModeling/RasterToolkit
repo_url: https://github.com/InstituteforDiseaseModeling/RasterToolkit

theme:
  name: material
  custom_dir: docs/customization/overrides
  font: 
    text: Roboto
    code: Roboto Mono
  logo: images/idm-logo-transparent.png
  favicon: images/favicon.ico
  features:
    # - navigation.footer
    - content.code.copy
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: white
      accent: light blue
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: black
      accent: light blue

nav:
  - Home: index.md
  - Tutorials:
    - tutorials.md
    - tutorials/tut_dotnames.ipynb
    - tutorials/tut_shape_subdivision.ipynb
    - tutorials/tut_pop_clipping.ipynb
  - API Reference: autoapi/

plugins:
  - search:
  - autorefs:
  - include-markdown:
  - glightbox:
  - mkdocs-autoapi:
      autoapi_ignore:
        - .github/**/*
        - examples/**/*
        - tests/**/*
        - build/**/*
        - docs/*
      autoapi_add_nav_entry: false
  - mkdocstrings:
  - mkdocs-jupyter:

markdown_extensions:
  - def_list:
  - pymdownx.caret:
  - pymdownx.mark:
  - pymdownx.tilde:
  - pymdownx.snippets:
  - pymdownx.blocks.details:
  - pymdownx.highlight:
      linenums: true
      default_lang: 'python'

copyright: Copyright &copy; 2025 Gates Foundation. All rights reserved.

extra_javascript:
  - customization/javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - customization/css/extra.css

extra:
  generator: false  # Removes acknowledgement of mkdocs-material
  footer_links:
    - text: "Privacy and Cookies Notice"
      href: "https://www.gatesfoundation.org/Privacy-and-Cookies-Notice"
    - text: "Terms of Use"
      href: "https://www.gatesfoundation.org/Terms-of-Use"
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/InstituteforDiseaseModeling/RasterToolkit
    - icon: fontawesome/regular/envelope
      link: mailto:idm@gatesfoundation.org
    - icon: octicons/globe-24
      link: https://idmod.org
    - icon: simple/youtube
      link: http://www.youtube.com/@institutefordiseasemodelin1987
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/company/institute-disease-modeling
  analytics:
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks for your feedback! If you like, provide additional information by
            using our <a href="https://app.smartsheet.com/b/form/ec8dbb77809949ecab7286a5ca74a206" target="_blank" rel="noopener">feedback form</a>.
        - icon: material/emoticon-sad-outline
          name: This page could be improved
          data: 0
          note: >- 
            Thanks for your feedback! Help us improve this page by
            using our <a href="https://app.smartsheet.com/b/form/ec8dbb77809949ecab7286a5ca74a206" target="_blank" rel="noopener">feedback form</a>.
